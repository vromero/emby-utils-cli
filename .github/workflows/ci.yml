name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, format, build, test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.13.x, 22.x, latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install
        # No package-lock.json in-tree (this project is not published to
        # npm), so we use `npm install` rather than `npm ci`. The `prepare`
        # script builds dist/ as a side effect of the install.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  integration:
    name: Integration (real Emby in Docker)
    runs-on: ubuntu-latest
    # Docker is available on `ubuntu-latest` runners.
    needs: verify
    env:
      EMBY_DOCKER_TESTS: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Pre-pull emby/embyserver
        run: docker pull emby/embyserver:latest

      - name: Run integration tests
        run: npm test -- tests/init.integration.test.ts
